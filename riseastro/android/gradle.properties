# Project-wide Gradle settings.

# Enable AndroidX
android.useAndroidX=true

# Kotlin code style
kotlin.code.style=official

# JVM arguments for Gradle daemon
org.gradle.jvmargs=-Xmx3072m -Dfile.encoding=UTF-8 -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError

# Suppress SDK warnings
android.suppressUnsupportedCompileSdk=35

# Disable parallel builds to reduce R8 memory contention
org.gradle.parallel=false

# Disable build caching to avoid disk space issues
org.gradle.caching=false

# Non-transitive R classes
android.nonTransitiveRClass=true


