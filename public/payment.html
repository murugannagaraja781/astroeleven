<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway - Astro Eleven</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0F0F15 0%, #1E1E2C 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #FFFFFF;
        }

        .payment-container {
            background: #1E1E2C;
            border-radius: 24px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            text-align: center;
        }

        .wallet-icon {
            width: 70px;
            height: 70px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            color: #FFD700;
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to right, #FFD700, #FFA500);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #9CA3AF;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .info-row:last-child { margin-bottom: 0; }

        .label { color: #9CA3AF; }
        .value { color: #FFFFFF; font-weight: 600; }

        .amount-section {
            margin-bottom: 35px;
        }

        .total-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9CA3AF;
            margin-bottom: 5px;
        }

        .total-amount {
            font-size: 3rem;
            font-weight: 900;
            color: #FFFFFF;
        }

        .pay-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: none;
            border-radius: 16px;
            color: #000;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(255, 215, 0, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(255, 215, 0, 0.3);
        }

        .pay-btn:active { transform: translateY(0); }

        .pay-btn:disabled {
            background: #4B5563;
            color: #9CA3AF;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .security-badge {
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #4ADE80;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Loading Spinner */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 21, 0.95);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loading-overlay.active { display: flex; }

        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255, 215, 0, 0.1);
            border-top: 4px solid #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            margin-top: 20px;
            color: #FFFFFF;
            font-weight: 500;
        }

        /* Error View */
        .error-view {
            display: none;
            color: #EF4444;
        }

        .error-icon { font-size: 4rem; margin-bottom: 20px; }
        .error-title { font-weight: 800; font-size: 1.4rem; margin-bottom: 10px; }
        .error-msg { color: #9CA3AF; margin-bottom: 30px; }

        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white; padding: 12px 24px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Processing...</div>
    </div>

    <div class="payment-container" id="paymentView">
        <div class="wallet-icon">
            <i class="fas fa-bolt"></i>
        </div>
        <h2>Astro Eleven Wallet</h2>
        <p class="subtitle">Secure Recharge powered by Razorpay</p>

        <div class="info-card">
            <div class="info-row">
                <span class="label">Payer Name</span>
                <span class="value" id="userName">User</span>
            </div>
            <div class="info-row">
                <span class="label">Session Expires</span>
                <span class="value" id="expiryTime">--</span>
            </div>
        </div>

        <div class="amount-section">
            <div class="total-label">Total Payable</div>
            <div class="total-amount" id="amountDisplay">₹--</div>
        </div>

        <button class="pay-btn" id="payBtn" onclick="payNow()">Proceed to Pay</button>

        <div class="security-badge">
            <i class="fas fa-shield-check"></i>
            100% SECURE & ENCRYPTED
        </div>
    </div>

    <div class="payment-container error-view" id="errorView">
        <div class="error-icon"><i class="fas fa-times-circle"></i></div>
        <div class="error-title" id="errorTitle">Oops! Error</div>
        <div class="error-msg" id="errorMsg">Something went wrong.</div>
        <button class="close-btn" onclick="closePage()">Go Back</button>
    </div>

    <script>
        let token = new URLSearchParams(window.location.search).get('token');
        let paymentData = null;
 
        function showLoading(show, text = 'Processing...') {
            const overlay = document.getElementById('loadingOverlay');
            document.getElementById('loadingText').textContent = text;
            overlay.classList.toggle('active', show);
        }

        function showError(title, msg) {
            document.getElementById('paymentView').style.display = 'none';
            document.getElementById('errorView').style.display = 'block';
            document.getElementById('errorTitle').textContent = title;
            document.getElementById('errorMsg').textContent = msg;
            showLoading(false);
        }

        async function verifyToken() {
            if (!token) return showError('Invalid Link', 'Payment token is missing.');
            
            showLoading(true, 'Verifying session...');
            try {
                const res = await fetch(`/api/payment/verify-token?token=${token}`);
                const data = await res.json();
                if (data.valid) {
                    paymentData = data;
                    document.getElementById('userName').textContent = data.userName;
                    document.getElementById('amountDisplay').textContent = '₹' + data.amount;
                    document.getElementById('expiryTime').textContent = data.expiresIn + 's';
                    showLoading(false);
                } else {
                    showError('Session Expired', data.error || 'Payment session is no longer active.');
                }
            } catch (e) {
                showError('Network Error', 'Failed to connect to our server.');
            }
        }

        async function payNow() {
            showLoading(true, 'Initiating payment...');
            try {
                const res = await fetch('/api/payment/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                const order = await res.json();
                
                if (order.ok) {
                    const options = {
                        "key": order.key,
                        "amount": order.amount,
                        "currency": "INR",
                        "name": "Astro Eleven",
                        "description": "Wallet Recharge",
                        "order_id": order.orderId,
                        "handler": function (response) {
                            verifyPayment(response);
                        },
                        "prefill": {
                            "name": paymentData.userName,
                        },
                        "theme": { "color": "#FFD700" },
                        "modal": {
                            "ondismiss": function() {
                                showLoading(false);
                            }
                        }
                    };
                    const rzp = new Razorpay(options);
                    rzp.open();
                } else {
                    showError('Order Failed', order.error);
                }
            } catch (e) {
                showError('Error', 'Could not create payment order.');
            }
        }

        async function verifyPayment(rzpResponse) {
            showLoading(true, 'Confirming payment...');
            try {
                const res = await fetch('/api/payment/callback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(rzpResponse)
                });
                const result = await res.json();
                if (result.ok) {
                    closeWithSuccess();
                } else {
                    showError('Verification Failed', 'Payment was successful but we couldn\'t verify it.');
                }
            } catch (e) {
                showError('Error', 'Network error during verification.');
            }
        }

        function closeWithSuccess() {
            if (window.AndroidBridge) {
                window.AndroidBridge.onPaymentComplete('success');
            }
            
            const isApp = new URLSearchParams(window.location.search).get('isApp') === 'true';
            if (isApp) {
                window.location.href = "astroeleven://payment-success?status=success";
            } else {
                showLoading(false);
                document.getElementById('paymentView').innerHTML = `
                    <div style="padding:40px; color:#4ADE80;">
                        <i class="fas fa-check-circle" style="font-size:4rem; margin-bottom:20px;"></i>
                        <h2>Payment Successful!</h2>
                        <p style="color:#9CA3AF; margin-top:10px;">You can now return to the app or close this tab.</p>
                    </div>
                `;
            }
        }

        function closePage() {
            if (window.AndroidBridge) {
                window.AndroidBridge.onPaymentComplete('failed');
            }
            
            const isApp = new URLSearchParams(window.location.search).get('isApp') === 'true';
            if (isApp) {
                window.location.href = "astroeleven://payment-failed?status=failed";
                window.close();
            } else {
                showError('Failed', 'The payment session was cancelled or failed.');
            }
        }

        window.onload = verifyToken;
    </script>
</body>

</html>
