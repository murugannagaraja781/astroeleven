name: Android Build

on:
  push:
    branches: [ main ]
    paths:
      - 'astroapp/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'astroapp/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x astroapp/android/gradlew

      - name: Build with Gradle
        run: cd astroapp/android && ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: astro-debug-apk
          path: astroapp/android/app/build/outputs/apk/debug/app-debug.apk
